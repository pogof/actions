name: Build and Push Docker image (release)

on:
  workflow_call:
    inputs:
      registry:
        type: string
        default: ghcr.io
      image_name:
        type: string
        required: true
      image_repo:
        type: string
        default: ""
      dockerfile:
        type: string
        default: ./Dockerfile
      context:
        type: string
        default: .
      checkout_ref:
        type: string
        default: ""
      tag_name:
        type: string
        required: true
      push_latest:
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code (default ref)
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v4

      - name: Checkout code (specified ref)
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Resolve image repo
        id: image-repo
        run: |
          if [ -n "${{ inputs.image_repo }}" ]; then
            image_repo="${{ inputs.image_repo }}"
          else
            image_repo="${{ inputs.registry }}/${{ github.repository_owner }}/${{ inputs.image_name }}"
          fi
          echo "IMAGE_REPO=$image_repo" >> "$GITHUB_ENV"

      - name: Set image tags
        id: tags
        run: |
          tags="$IMAGE_REPO:${{ inputs.tag_name }}"
          if [ "${{ inputs.push_latest }}" = "true" ]; then
            tags="$tags\n$IMAGE_REPO:latest"
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf "%b\n" "$tags" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (release)
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
