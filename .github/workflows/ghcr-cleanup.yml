name: Cleanup GHCR images

on:
  workflow_call:
    inputs:
      package_name:
        type: string
        required: true
      owner:
        type: string
        default: ""
      retention_days:
        type: number
        default: 14
      dry_run:
        type: boolean
        default: false
      delete_tag_regex:
        type: string
        default: "^dev-[0-9a-f]{7,40}$"
      keep_latest_matching_tag:
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old container tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ inputs.owner || github.repository_owner }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          RETENTION_DAYS: ${{ inputs.retention_days }}
          DRY_RUN: ${{ inputs.dry_run }}
          DELETE_TAG_REGEX: ${{ inputs.delete_tag_regex }}
          KEEP_LATEST_MATCHING_TAG: ${{ inputs.keep_latest_matching_tag }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.request
          from datetime import datetime, timezone

          token = os.environ.get("GH_TOKEN")
          owner = os.environ.get("OWNER")
          package_name = os.environ.get("PACKAGE_NAME")
          retention_days = int(os.environ.get("RETENTION_DAYS", "14"))
          dry_run = os.environ.get("DRY_RUN", "false").lower() == "true"
          delete_tag_regex = os.environ.get("DELETE_TAG_REGEX", r"^dev-[0-9a-f]{7,40}$")
          keep_latest_matching_tag = os.environ.get("KEEP_LATEST_MATCHING_TAG", "true").lower() == "true"

          if not token:
            raise SystemExit("GITHUB_TOKEN is required.")

          api_base = "https://api.github.com"

          def api_request(url, method="GET", data=None):
            headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
            }
            if data is not None:
              data = json.dumps(data).encode("utf-8")
              headers["Content-Type"] = "application/json"
            req = urllib.request.Request(url, data=data, headers=headers, method=method)
            with urllib.request.urlopen(req) as resp:
              body = resp.read().decode("utf-8")
              return resp, body

          def get_owner_type():
            resp, body = api_request(f"{api_base}/users/{owner}")
            if resp.status != 200:
              raise SystemExit(f"Failed to read owner info: {resp.status} {body}")
            return json.loads(body).get("type")

          def list_versions(endpoint):
            versions = []
            url = f"{endpoint}?per_page=100"
            while url:
              resp, body = api_request(url)
              if resp.status != 200:
                raise SystemExit(f"Failed to list versions: {resp.status} {body}")
              versions.extend(json.loads(body))
              link = resp.headers.get("Link", "")
              next_url = None
              for part in link.split(","):
                if "rel=\"next\"" in part:
                  next_url = part[part.find("<") + 1:part.find(">")]
                  break
              url = next_url
            return versions

          owner_type = get_owner_type()
          if owner_type == "Organization":
            endpoint = f"{api_base}/orgs/{owner}/packages/container/{package_name}/versions"
          else:
            endpoint = f"{api_base}/users/{owner}/packages/container/{package_name}/versions"

          versions = list_versions(endpoint)
          if not versions:
            print("No package versions found.")
            sys.exit(0)

          release_tag_re = re.compile(r"^v?\d+\.\d+\.\d+([.-].+)?$")
          try:
            delete_tag_re = re.compile(delete_tag_regex)
          except re.error as exc:
            raise SystemExit(f"Invalid delete_tag_regex '{delete_tag_regex}': {exc}")

          def is_release_tag(tag):
            return bool(release_tag_re.match(tag))

          def parse_time(ts):
            return datetime.fromisoformat(ts.replace("Z", "+00:00"))

          def matches_delete_selector(tags):
            for tag in tags:
              if delete_tag_re.match(tag):
                return True
            return False

          latest_matching_tag = None
          latest_matching_time = None
          for version in versions:
            tags = version.get("metadata", {}).get("container", {}).get("tags", []) or []
            updated_at = parse_time(version.get("updated_at") or version.get("created_at"))
            for tag in tags:
              if delete_tag_re.match(tag):
                if latest_matching_time is None or updated_at > latest_matching_time:
                  latest_matching_time = updated_at
                  latest_matching_tag = tag

          cutoff = datetime.now(timezone.utc)
          protected_tags = {"latest", "dev"}

          def has_protected_tag(tags):
            for tag in tags:
              if tag in protected_tags or is_release_tag(tag):
                return True
            return False

          deleted = 0
          kept = 0

          for version in versions:
            version_id = version.get("id")
            tags = version.get("metadata", {}).get("container", {}).get("tags", []) or []
            updated_at = parse_time(version.get("updated_at") or version.get("created_at"))
            age_days = (cutoff - updated_at).days

            if has_protected_tag(tags):
              kept += 1
              continue

            if age_days <= retention_days:
              kept += 1
              continue

            if not matches_delete_selector(tags):
              kept += 1
              continue

            if keep_latest_matching_tag and latest_matching_tag and latest_matching_tag in tags:
              kept += 1
              continue

            delete_url = f"{endpoint}/{version_id}"
            if dry_run:
              print(f"DRY RUN: delete version {version_id} tags={tags} age_days={age_days}")
              deleted += 1
              continue

            resp, body = api_request(delete_url, method="DELETE")
            if resp.status not in (204, 202):
              print(f"Failed to delete {version_id}: {resp.status} {body}")
              kept += 1
              continue
            print(f"Deleted version {version_id} tags={tags} age_days={age_days}")
            deleted += 1

          print(
            f"Cleanup complete. kept={kept} deleted={deleted} "
            f"latest_matching_tag={latest_matching_tag} delete_tag_regex={delete_tag_regex}"
          )
          PY
